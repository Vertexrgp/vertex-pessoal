openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Vertex Finance OS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: transactions
    description: Financial transactions (Lançamentos)
  - name: categories
    description: Categories and subcategories
  - name: accounts
    description: Bank accounts
  - name: credit-cards
    description: Credit cards and invoices (Cartões e Faturas)
  - name: monthly-plans
    description: Monthly planning (Planejamento Mensal)
  - name: assets
    description: Patrimônio - Investments, receivables, debts, income
  - name: budget
    description: Budget groups and items (Orçamento)
  - name: dashboard
    description: Dashboard summary data
  - name: reports
    description: Reports and analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── CREDIT CARDS ────────────────────────────────────────────────────────────
  /credit-cards:
    get:
      operationId: listCreditCards
      tags: [credit-cards]
      summary: List all credit cards
      responses:
        "200":
          description: Credit cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CreditCard"
    post:
      operationId: createCreditCard
      tags: [credit-cards]
      summary: Create a credit card
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCreditCardInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditCard"

  /credit-cards/{id}:
    get:
      operationId: getCreditCard
      tags: [credit-cards]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Credit card
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditCard"
    put:
      operationId: updateCreditCard
      tags: [credit-cards]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCreditCardInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditCard"
    delete:
      operationId: deleteCreditCard
      tags: [credit-cards]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /credit-cards/{id}/fatura:
    get:
      operationId: getCreditCardFatura
      tags: [credit-cards]
      summary: Get invoice (fatura) for a credit card in a given month/year
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
        - name: year
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Fatura details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaturaResponse"

