components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    CreditCard:
      type: object
      properties:
        id:
          type: integer
        nomeCartao:
          type: string
        banco:
          type: string
        bandeira:
          type: string
          enum: [Visa, Mastercard, Elo, Amex, Hipercard, Outros]
        limiteTotal:
          type: number
        diaFechamento:
          type: integer
        diaVencimento:
          type: integer
        cor:
          type: string
        ativo:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, nomeCartao, banco, bandeira, limiteTotal, diaFechamento, diaVencimento, cor, ativo, createdAt, updatedAt]

    CreateCreditCardInput:
      type: object
      properties:
        nomeCartao:
          type: string
        banco:
          type: string
        bandeira:
          type: string
          enum: [Visa, Mastercard, Elo, Amex, Hipercard, Outros]
        limiteTotal:
          type: number
        diaFechamento:
          type: integer
        diaVencimento:
          type: integer
        cor:
          type: string
        ativo:
          type: boolean
      required: [nomeCartao, banco, bandeira, limiteTotal, diaFechamento, diaVencimento]

    FaturaItem:
      type: object
      properties:
        id:
