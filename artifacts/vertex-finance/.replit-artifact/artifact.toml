kind = "web"
previewPath = "/"
title = "Vertex Finance OS"
version = "1.0.0"
id = "artifacts/vertex-finance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19644

[services.development]
run = "pnpm --filter @workspace/vertex-finance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vertex-finance", "run", "build" ]
publicDir = "artifacts/vertex-finance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19644"
BASE_PATH = "/"
